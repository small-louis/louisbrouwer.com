<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B8MYVB3T7F"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-B8MYVB3T7F");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelving &mdash; Boog Design &mdash; Louis Brouwer</title>
    <meta name="author" content="Louis Brouwer">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-elevated: #141414;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #c8c8c8;
            --border: #222;
            --max-width: 1100px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--text-muted);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        a:hover {
            text-decoration-color: var(--text);
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        nav .name {
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.02em;
            text-decoration: none;
        }

        nav .links {
            display: flex;
            gap: 28px;
        }

        nav .links a {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        nav .links a:hover {
            color: var(--text);
        }

        /* CONTENT */
        .content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 120px 40px 80px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .description {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 700px;
            margin-bottom: 48px;
            line-height: 1.7;
        }

        /* GALLERY */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gallery img {
            width: 100%;
            display: block;
            background: #1a1a1a;
        }

        /* FOOTER */
        footer {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 40px 60px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            nav .links { gap: 16px; }
            nav .links a { font-size: 12px; }
            .content { padding: 100px 20px 60px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="name">Louis Brouwer</a>
        <div class="links">
            <a href="index.html#about">About</a>
            <a href="index.html#work">Work</a>
            <a href="index.html#reading">Reading</a>
            <a href="index.html#log">Log</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <div class="content">
        <a href="boog.html" class="back-link">&larr; Back to Boog Design</a>
        <h1>Shelving</h1>
        <p class="description">A steel cable and bamboo shelving unit with copper pin joints.</p>

        <div class="gallery">
            <img src="images/boog/shelving/hero.jpg" alt="Shelving unit">
            <img src="images/boog/shelving/cable-detail.jpg" alt="Cable detail">
            <img src="images/boog/shelving/joint.jpg" alt="Copper pin joint">
            <img src="images/boog/shelving/hallway.jpg" alt="Shelving in hallway">
        </div>
    </div>

    <footer>
        Louis Brouwer &copy; 2026
    </footer>

</body>
</html>
